<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS · Reportes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
 --ink:#e6ecf5;--ink2:#aab6c8;--mut:#6b7688;--line:#1e2836;--line2:#171f2b;
 --paper:#080b12;--white:#0f1520;--card:#0f1520;
 --sig:#3b82f6;--sigd:#60a5fa;--sigbg:rgba(59,130,246,.12);
 --good:#22c55e;--goodbg:rgba(34,197,94,.11);--warn:#eab308;--warnbg:rgba(234,179,8,.11);
 --red:#ef4444;--redbg:rgba(239,68,68,.11);--gold:#f5c518;--goldbg:rgba(245,197,24,.10);
 --sh:0 1px 2px rgba(0,0,0,.4);--shl:0 8px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;color-scheme:dark}
input,select{color:var(--ink)}
.hide{display:none!important}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(1000px 500px at 20% -10%,rgba(59,130,246,.09),transparent),var(--paper)}
.login-card{background:var(--white);border:1px solid var(--line);border-radius:18px;width:100%;max-width:410px;padding:32px 28px;box-shadow:var(--shl)}
.brand-badge{display:inline-flex;align-items:center;gap:9px;margin-bottom:16px}
.brand-badge .mk{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#1e293b,#334155);color:#e6ecf5;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px}
.brand-badge .tx{font-family:'Space Grotesk';font-weight:700;letter-spacing:.06em;font-size:13px}
.login-card h1{font-family:'Space Grotesk';font-weight:700;font-size:23px;margin:2px 0 4px}
.login-card p.sub{color:var(--mut);font-size:13px;margin-bottom:18px;line-height:1.5}
.roletabs{display:flex;gap:6px;margin-bottom:16px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:5px}
.roletab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-radius:8px}
.roletab.on{background:var(--white);color:var(--ink);box-shadow:var(--sh)}
label.fl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:700;display:block;margin:12px 0 7px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper);font-family:'Inter';font-size:15px}
.inp:focus{outline:none;border-color:var(--sig);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
.btn{width:100%;padding:13px;border:none;border-radius:11px;background:var(--sig);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px}
.btn:hover{background:#2f6fd6}.btn:disabled{opacity:.5}
.err{color:var(--red);font-size:12.5px;margin-top:10px;font-weight:600;min-height:16px}

/* SHELL */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#0a0e16;border-right:1px solid var(--line);color:#aab6c8;display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:14px}
.logo .mk{width:30px;height:30px;border-radius:9px;border:1.5px solid rgba(255,255,255,.18);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#e6ecf5}
.logo .tx{font-family:'Space Grotesk';font-weight:700;letter-spacing:.2em;font-size:12px;color:#e6ecf5}
nav{display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:#8592a6;cursor:pointer}
.nav-item .i{font-size:14px;width:18px;text-align:center;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.05);color:#dbe3ef}
.nav-item.active{background:rgba(59,130,246,.14);color:#dbe6fb;box-shadow:inset 0 0 0 1px rgba(59,130,246,.3)}
.side-foot{margin-top:auto;padding-top:16px}
.side-btn{width:100%;display:flex;align-items:center;gap:8px;justify-content:center;padding:10px;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(255,255,255,.04);color:#cbd5e1;font-size:12.5px;font-weight:600;cursor:pointer}
.side-btn:hover{background:rgba(255,255,255,.09);color:#fff}

.main{flex:1;min-width:0;padding:26px 30px 70px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sigd);font-weight:700}
h1.title{font-family:'Space Grotesk';font-weight:700;font-size:clamp(22px,3vw,30px);line-height:1.05;letter-spacing:-.02em;margin-top:6px}
.subtitle{color:var(--mut);font-size:13px;margin-top:6px}
.whoami{display:flex;align-items:center;gap:11px}
.whoami .av{width:38px;height:38px;border-radius:50%;background:var(--sig);color:#fff;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px}
.whoami .av.dir{background:#1e293b}
.logout-top{border:1px solid var(--line);background:var(--card);color:var(--ink2);font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:10px;cursor:pointer;white-space:nowrap}
.logout-top:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#f87171}
.kpi-ic svg,.nav-item .i svg{width:15px;height:15px;display:block}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;flex-shrink:0}
.pill{display:inline-flex;align-items:center}
.pform{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.pform .fg{display:flex;flex-direction:column;gap:6px}
.pform label{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:700}
.pform input,.pform select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);font-family:'Inter';font-size:13.5px}
.pform input:focus,.pform select:focus{outline:none;border-color:var(--sig)}
.pform .cli{min-width:200px;flex:1}
.pform .addbtn{padding:11px 18px;border:none;border-radius:10px;background:var(--sig);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer}
.pform .addbtn:hover{background:#2f6fd6}
.tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;padding:4px 10px;border-radius:20px}
.tag.agendado{background:rgba(59,130,246,.14);color:#60a5fa}
.tag.posible{background:rgba(234,179,8,.14);color:#eab308}
.tag.pagado{background:rgba(34,197,94,.14);color:#4ade80}
.icobtn{border:1px solid var(--line);background:var(--paper);color:var(--mut);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;font-weight:600}
.icobtn:hover{color:var(--ink);border-color:var(--sig)}
.icobtn.del:hover{color:#f87171;border-color:rgba(239,68,68,.4)}
.agrupo{margin-bottom:22px}
.agrupo-h{display:flex;align-items:center;gap:10px;margin:0 0 10px;font-family:'Space Grotesk';font-weight:600;font-size:15px}
.agrupo-h .cnt{font-size:12px;color:var(--mut);font-weight:600}
.agrupo-h .sum{margin-left:auto;color:#4ade80;font-weight:700;font-size:14px}
.cellin{width:100%;min-width:120px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);font-family:'Inter';font-size:13px}
.cellin.num{width:90px;min-width:0}
.cellin:focus{outline:none;border-color:var(--sig)}
.whoami .nm{font-weight:700;font-size:14px}
.whoami .ro{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

/* KPIs */
.kpis{display:grid;gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--sh)}
.kpi-top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.kpi-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.kpi-l{font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--mut);font-weight:700}
.kpi-n{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1}
.kpi-ic{background:rgba(148,163,184,.1);color:#8ea3bd;border:1px solid rgba(148,163,184,.14)}
.ic-blue,.ic-green,.ic-gold,.ic-violet{background:rgba(148,163,184,.1);color:#8ea3bd}

/* toolbar */
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.chip{padding:9px 15px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:var(--white);color:var(--ink2)}
.chip.on{background:var(--sigbg);border-color:rgba(59,130,246,.4);color:var(--sigd)}
.bar input[type=date]{padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--white);font-family:'Inter';font-size:12.5px}
.bar .sp{flex:1}

/* tables */
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);overflow:hidden}
.section-t{font-family:'Space Grotesk';font-weight:600;font-size:16px;margin:2px 0 14px;display:flex;align-items:center;gap:9px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px}
thead th{background:#0b111b;text-align:right;padding:12px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
thead th:nth-child(1),thead th:nth-child(2){text-align:left}
tbody td{padding:12px 13px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
.rk{text-align:center!important;color:var(--mut);font-weight:700;width:42px}
.ag{text-align:left!important;font-weight:600}
tr.top td{background:linear-gradient(90deg,rgba(245,197,24,.10),transparent)}
tr.top .ag{color:var(--gold)}
tr.me td{background:rgba(59,130,246,.08)}
tr.alert-row td{background:rgba(239,68,68,.09)}
.pill{display:inline-block;padding:5px 11px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
tbody tr:hover td{background:rgba(255,255,255,.03)}
.g{color:var(--good);font-weight:800}.b{color:var(--sigd);font-weight:700}.money{color:var(--good);font-weight:800}
.z{color:#3a4658}
.conv{font-weight:800}
tfoot td{padding:13px;text-align:right;font-weight:800;border-top:2px solid var(--line);background:#0b111b}
tfoot td.lb{text-align:left;text-transform:uppercase;font-size:10px;letter-spacing:.05em;color:var(--gold)}
.barwrap{display:inline-block;width:70px;height:7px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;vertical-align:middle}
.barfill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:5px}
.scroll{overflow-x:auto}
.note{margin-top:14px;font-size:11.5px;color:var(--mut);line-height:1.6;border-left:3px solid var(--gold);padding:8px 13px;background:var(--goldbg);border-radius:8px}
.setup{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:26px;text-align:center;color:var(--mut);font-size:13.5px;line-height:1.7}
.setup h3{font-family:'Space Grotesk';color:var(--ink);margin-bottom:8px}
.setup code{background:#0b111b;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--sigd);font-size:12px}
.loading{text-align:center;padding:44px;color:var(--mut);font-size:13px}
.av-sm{width:30px;height:30px;border-radius:50%;display:inline-grid;place-items:center;color:#fff;font-size:11px;font-weight:700;font-family:'Space Grotesk';vertical-align:middle;margin-right:9px}

@media(max-width:900px){
 .app{flex-direction:column}
 .sidebar{width:100%;height:auto;position:static;flex-direction:row;align-items:center;padding:10px 12px;gap:12px}
 .logo{border:none;margin:0;padding:0}
 nav{flex:1;flex-direction:row;overflow-x:auto;gap:6px}
 .nav-item{white-space:nowrap}
 .side-foot{display:none}
 .main{padding:16px 14px 56px}
 .kpis{grid-template-columns:repeat(2,1fr)!important;gap:10px}
 .kpi-n{font-size:23px}
}
/* En celular, cada fila de la tabla se vuelve una TARJETA legible */
@media(max-width:680px){
 .panel.scroll{overflow:visible;background:transparent;border:none;box-shadow:none}
 table{font-size:15px}
 thead,tfoot{display:none}
 tbody,tr,td{display:block;width:100%}
 tbody tr{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px 8px;margin-bottom:12px}
 tbody tr.top{border-color:rgba(245,197,24,.4)}
 tbody tr.alert-row{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.06)}
 tbody tr.me{border-color:rgba(59,130,246,.45)}
 tbody td{display:flex;justify-content:space-between;align-items:center;text-align:right!important;padding:9px 0;border:none;border-bottom:1px solid rgba(255,255,255,.05);white-space:normal}
 tbody td:last-child{border-bottom:none}
 tbody td::before{content:attr(data-label);color:var(--mut);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;text-align:left;margin-right:12px}
 tbody td.rk{display:none}
 tbody td.ag{justify-content:flex-start;text-align:left!important;font-size:17px;font-weight:700;padding-bottom:11px;margin-bottom:4px;border-bottom:1px solid var(--line)}
 tbody td.ag::before{display:none}
 tbody td.ag .av-sm{width:34px;height:34px;font-size:12px}
 .barwrap{width:60px}
}
</style></head><body>

function parseCSV(text){
 const rows=[];let i=0,f='',row=[],q=false;
 while(i<text.length){const c=text[i];
  if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
  else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c==='\r'){}else f+=c;}
  i++;}
 if(f.length||row.length){row.push(f);rows.push(row);}
 return rows;
}
async function loadVentas(){
 if(!VENTAS_CSV_URL){VENTAS='setup';return;}
 try{
  const r=await fetch(VENTAS_CSV_URL);const txt=await r.text();
  const rows=parseCSV(txt).filter(r=>r.some(c=>(c||'').trim()!==''));
  // localizar fila de encabezado: la que contiene "NOMBRE"
  let hi=rows.findIndex(r=>r.some(c=>norm(c)==='nombre'));
  if(hi<0)hi=0;
  const header=rows[hi].map(c=>(c||'').trim());
  const nameIdx=header.findIndex(c=>norm(c)==='nombre');
  const totIdx=header.findIndex(c=>norm(c).includes('total'));
  const prodIdx=[];header.forEach((c,idx)=>{if(idx!==nameIdx&&idx!==totIdx&&c&&idx>nameIdx)prodIdx.push(idx);});
  const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;};
  const out=[];
  for(let r=hi+1;r<rows.length;r++){
   const row=rows[r];const name=(row[nameIdx]||'').trim();
   if(!name||norm(name)==='total')continue;
   const prods={};let sum=0;
   prodIdx.forEach(idx=>{const v=num(row[idx]);if(v){prods[header[idx]]=(prods[header[idx]]||0)+v;sum+=v;}});
   const total=totIdx>=0?num(row[totIdx]):sum;
   out.push({name,total:total||sum,prods});
  }
  VENTAS=out;
 }catch(e){VENTAS='error';}
}

function ftdSetPeriod(p){FTD_PERIOD=p;renderFtds();}
function inRange(f){
 const hoy=bogotaHoy();
 if(FTD_PERIOD==='hoy')return f===hoy;
 if(FTD_PERIOD==='7'){const d=new Date(hoy);d.setDate(d.getDate()-6);return f>=iso(d)&&f<=hoy;}
 if(FTD_PERIOD==='mes')return f.slice(0,7)===hoy.slice(0,7);
 if(FTD_PERIOD==='rango')return (!FTD_FROM||f>=FTD_FROM)&&(!FTD_TO||f<=FTD_TO);
 return true;
}
function bogotaHoy(){return new Date(Date.now()-5*3600*1000).toISOString().slice(0,10);}
function iso(d){return d.toISOString().slice(0,10);}

/* ---------- PRODUCTIVIDAD ---------- */
function minsSince(iso){return iso?Math.floor((Date.now()-Date.parse(iso))/60000):null;}
function agoTxt(m){if(m==null)return 'sin datos';if(m<1)return 'ahora';if(m<60)return 'hace '+m+' min';const h=Math.floor(m/60);if(h<24)return 'hace '+h+'h '+(m%60)+'m';const d=Math.floor(h/24);return 'hace '+d+(d===1?' día':' días')+(h%24?' '+(h%24)+'h':'');}
function renderProd(){
 const el=$('viewProd');
 if(!ACTIVIDAD.length){el.innerHTML='<div class="loading">Cargando actividad… (se llena con la sincronización de GoHighLevel)</div>';return;}
 let rows=ACTIVIDAD.filter(x=>x.agente&&x.agente!=='sin asignar'&&!excluido(x.agente));
 if(ROLE==='agente')rows=rows.filter(x=>sameAgent(x.agente,ME));
 rows=rows.map(x=>{
  const reg=x.registros_hoy||0;
  const mins=minsSince(x.ultima_actividad_at); // minutos desde la última actividad (aunque sea de días atrás)
  let estado,rank;
  if(reg>0){estado='activo';rank=2;}          // registró hoy
  else if(mins!=null&&mins>=INACT_MIN){estado='inactivo';rank=0;} // sin registrar hoy → alerta
  else{estado='inactivo';rank=1;}
  return {...x,reg,mins,estado,rank};
 });
 rows.sort((a,b)=>a.rank-b.rank || (b.mins||0)-(a.mins||0) || b.reg-a.reg);
 const activos=rows.filter(r=>r.estado==='activo').length;
 const inactHoy=rows.filter(r=>r.reg===0).length;
 const critico=rows.filter(r=>r.reg===0 && r.mins!=null && r.mins>=1440).length; // +1 día sin actividad
 let kpis=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-green">${ICONS.check}</div><div class="kpi-l">Activos hoy</div></div><div class="kpi-n" style="color:#4ade80">${activos}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic">${ICONS.alert}</div><div class="kpi-l">Sin registros hoy</div></div><div class="kpi-n" style="color:#f87171">${inactHoy}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-gold">${ICONS.clock}</div><div class="kpi-l">+1 día inactivos</div></div><div class="kpi-n" style="color:#facc15">${critico}</div></div>
  </div>`;
 const badge=r=>{
  if(r.estado==='activo')return '<span class="pill" style="background:rgba(34,197,94,.13);color:#22c55e"><span class="dot" style="background:#22c55e"></span>Activo</span>';
  const col=(r.mins!=null&&r.mins>=1440)?['#ef4444','rgba(239,68,68,.13)']:['#eab308','rgba(234,179,8,.13)'];
  return `<span class="pill" style="background:${col[1]};color:${col[0]}"><span class="dot" style="background:${col[0]}"></span>Inactivo</span>`;
 };
 let body='';
 rows.forEach((r,i)=>{
  const rojo=r.reg===0 && r.mins!=null && r.mins>=1440;
  const cls=(rojo?'alert-row':'')+(norm(r.agente)===norm(ME)?' me':'');
  const actCol=r.reg>0?'#4ade80':(rojo?'#f87171':'var(--ink2)');
  body+=`<tr class="${cls}"><td class="rk">${i+1}</td><td class="ag">${avatar(r.agente)}${esc(r.agente)}</td>
   <td class="b" data-label="Leads hoy">${r.leads_hoy||0}</td><td class="g" data-label="Registros hoy">${r.reg}</td>
   <td data-label="Última actividad" style="color:${actCol};font-weight:600">${agoTxt(r.mins)}</td>
   <td data-label="Estado" style="text-align:center">${badge(r)}</td></tr>`;
 });
 el.innerHTML=kpis+`<div class="panel scroll"><table><thead><tr><th>#</th><th>Agente</th><th>Leads hoy</th><th>Registros hoy</th><th>Última actividad</th><th style="text-align:center">Estado</th></tr></thead><tbody>${body}</tbody></table></div>
   <div class="note"><b>Última actividad</b> = cuánto hace que el agente registró o hizo un FTD por última vez (aunque haya sido hace días). <b style="color:#22c55e">Activo</b> = ya registró hoy · <b style="color:#eab308">Inactivo</b> = sin registro hoy · <b style="color:#f87171">rojo</b> = +1 día sin actividad. Te llega un correo cuando un agente pasa ${INACT_MIN} min sin registrar en horario laboral (8am–11pm).</div>`;
}

/* ---------- PAGOS ---------- */
function fdate(f){if(!f)return '—';const d=new Date(f+'T00:00:00');return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});}
function pTag(p){if(p.estado==='pagado')return '<span class="tag pagado">Pagado</span>';return '<span class="tag '+(p.tipo==='posible'?'posible':'agendado')+'">'+(p.tipo==='posible'?'Posible':'Agendado')+'</span>';}
function onProdChange(){
 const v=$('pgProd').value;const pd=PRODUCTOS.find(x=>x.v===v);
 const esOtro=v==='otro';
 $('pgOtroWrap').style.display=esOtro?'flex':'none';
 if(esOtro){$('pgMonto').value='';$('pgMonto').readOnly=false;}
 else if(pd){$('pgMonto').value=pd.precio;$('pgMonto').readOnly=false;}
}
function submitPago(){
 const cli=$('pgCli').value.trim();if(!cli){$('pgCli').focus();return;}
 const pv=$('pgProd').value,pd=PRODUCTOS.find(x=>x.v===pv);
 const producto=pv==='otro'?($('pgOtro').value.trim()||'Otro'):(pd?pd.label:'');
 const p={agente:ME,cliente:cli,producto,tipo:$('pgTipo').value,monto:parseFloat($('pgMonto').value)||null,
   abono:parseFloat($('pgAbono').value)||0,fecha:$('pgFecha').value||null,notas:$('pgObs').value.trim(),estado:'pendiente'};
 addPago(p);['pgCli','pgMonto','pgAbono','pgFecha','pgObs','pgOtro'].forEach(i=>$(i).value='');
 $('pgProd').value='oro';onProdChange();$('pgCli').focus();
}
function togglePagado(id,estado){patchPago(id,{estado:estado==='pagado'?'pendiente':'pagado'});}
function pagoRow(p,own){
 const acc=own?`<button class="icobtn" title="Marcar pagado/pendiente" onclick="togglePagado('${p.id}','${p.estado}')">✓</button> <button class="icobtn del" title="Eliminar" onclick="delPago('${p.id}')">✕</button>`:'';
 const st=p.estado==='pagado'?'opacity:.55;text-decoration:line-through':'';
 const ab=p.abono>0?`<span style="color:#4ade80;font-weight:700">${money(p.abono)}</span>`:'<span class="z">—</span>';
 const abonoCell=own
   ?`<input class="cellin num" type="number" value="${p.abono||''}" placeholder="0" onchange="patchPago('${p.id}',{abono:parseFloat(this.value)||0})">`
   :ab;
 const obsCell=own
   ?`<input class="cellin" value="${esc(p.notas||'')}" placeholder="Observaciones…" onchange="patchPago('${p.id}',{notas:this.value})">`
   :`<span style="color:var(--ink2)">${p.notas?esc(p.notas):'—'}</span>`;
 return `<tr><td class="ag" style="${st}">${esc(p.cliente)}</td>
  <td data-label="Producto" style="color:var(--ink2)">${p.producto?esc(p.producto):'—'}</td>
  <td data-label="Tipo">${pTag(p)}</td>
  <td class="money" data-label="Monto">${p.monto?money(p.monto):'—'}</td>
  <td data-label="Abonado">${abonoCell}</td>
  <td data-label="Observaciones">${obsCell}</td>
  <td data-label="Fecha" style="color:var(--ink2)">${fdate(p.fecha)}</td>
  ${own?`<td data-label="Acciones" style="text-align:right;white-space:nowrap">${acc}</td>`:''}</tr>`;
}
function renderPagos(){
 const el=$('viewPagos');
 const fmtSum=arr=>money(arr.reduce((s,p)=>s+(p.estado!=='pagado'?(p.monto||0):0),0));
 if(ROLE==='agente'){
  const mine=PAGOS.filter(p=>sameAgent(p.agente,ME));
  const ag=mine.filter(p=>p.tipo!=='posible'&&p.estado!=='pagado'),po=mine.filter(p=>p.tipo==='posible'&&p.estado!=='pagado');
  let kpis=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-blue">${ICONS.check}</div><div class="kpi-l">Agendados</div></div><div class="kpi-n">${ag.length}</div></div>
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-gold">${ICONS.clock}</div><div class="kpi-l">Posibles</div></div><div class="kpi-n">${po.length}</div></div>
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-green">${ICONS.dollar}</div><div class="kpi-l">Monto pendiente</div></div><div class="kpi-n" style="color:#4ade80;font-size:20px">${fmtSum(mine)}</div></div>
   </div>`;
  const grupos=[...new Set(PRODUCTOS.map(p=>p.grupo))];
  const prodOpts=grupos.map(g=>`<optgroup label="${g}">`+PRODUCTOS.filter(p=>p.grupo===g).map(p=>`<option value="${p.v}">${p.label}${p.precio!=null?' ($'+p.precio+')':''}</option>`).join('')+`</optgroup>`).join('');
  const form=`<div class="pform">
    <div class="fg cli"><label>Cliente</label><input id="pgCli" placeholder="Nombre del cliente" onkeydown="if(event.key==='Enter')submitPago()"></div>
    <div class="fg" style="min-width:190px"><label>Licencia / Producto</label><select id="pgProd" onchange="onProdChange()">${prodOpts}</select></div>
    <div class="fg" id="pgOtroWrap" style="display:none"><label>Nombre (otro)</label><input id="pgOtro" placeholder="¿Qué vendió?"></div>
    <div class="fg"><label>Monto</label><input id="pgMonto" type="number" placeholder="0" style="width:100px"></div>
    <div class="fg"><label>Abono</label><input id="pgAbono" type="number" placeholder="0" style="width:100px"></div>
    <div class="fg"><label>Tipo</label><select id="pgTipo"><option value="agendado">Agendado</option><option value="posible">Posible</option></select></div>
    <div class="fg"><label>Fecha</label><input id="pgFecha" type="date"></div>
    <div class="fg" style="flex:1;min-width:170px"><label>Observaciones del cliente</label><input id="pgObs" placeholder="Ej: pide llamar en la tarde…" onkeydown="if(event.key==='Enter')submitPago()"></div>
    <button class="addbtn" onclick="submitPago()">+ Agregar</button>
   </div>`;
  let body=mine.length?mine.map(p=>pagoRow(p,true)).join(''):`<tr><td colspan="8" style="text-align:center;color:var(--mut);padding:26px">Aún no tienes pagos registrados. Agrega el primero arriba.</td></tr>`;
  el.innerHTML=kpis+form+`<div class="panel scroll"><table><thead><tr><th>Cliente</th><th>Producto</th><th>Tipo</th><th>Monto</th><th>Abonado</th><th>Observaciones</th><th>Fecha</th><th style="text-align:right">Acciones</th></tr></thead><tbody>${body}</tbody></table></div>
    <div class="note">Elige la <b>licencia</b> y el monto se pone solo (en <b>upgrades</b> ya va la diferencia). Usa <b>Otro</b> para vender algo distinto. Puedes anotar <b>observaciones</b> y el <b>abono</b> del cliente (se editan en la tabla). Marca con ✓ cuando se pague completo.</div>`;
  onProdChange();
 } else {
  let list=PAGOS.filter(p=>!excluido(p.agente)&&p.estado!=='pagado');
  const ags={};list.forEach(p=>{(ags[p.agente]=ags[p.agente]||[]).push(p);});
  const order=Object.keys(ags).sort((a,b)=>ags[b].length-ags[a].length);
  const totMonto=fmtSum(list);
  let kpis=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-blue">${ICONS.check}</div><div class="kpi-l">Pagos pendientes</div></div><div class="kpi-n">${list.length}</div></div>
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-gold">${ICONS.clock}</div><div class="kpi-l">Posibles</div></div><div class="kpi-n">${list.filter(p=>p.tipo==='posible').length}</div></div>
    <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-green">${ICONS.dollar}</div><div class="kpi-l">Monto proyectado</div></div><div class="kpi-n" style="color:#4ade80;font-size:20px">${totMonto}</div></div>
   </div>`;
  let groups=order.length?order.map(a=>{
    const ps=ags[a];const sum=fmtSum(ps);
    const rows=ps.map(p=>pagoRow(p,false)).join('');
    return `<div class="agrupo"><div class="agrupo-h">${avatar(a)}${esc(a)} <span class="cnt">· ${ps.length} pago(s)</span><span class="sum">${sum}</span></div>
      <div class="panel scroll"><table><thead><tr><th>Cliente</th><th>Producto</th><th>Tipo</th><th>Monto</th><th>Abonado</th><th>Observaciones</th><th>Fecha</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join(''):`<div class="setup"><h3>Sin pagos aún</h3>Cuando los agentes registren sus pagos agendados o posibles, aquí verás el consolidado por agente.</div>`;
  el.innerHTML=kpis+groups;
 }
}

/* ---------- CLIENTES (leads) ---------- */
function cliFiltro(f){CLI_FILTRO=f;renderClientes();}
function hs(iso){return iso?(Date.now()-Date.parse(iso))/3600000:null;}
function hTxt(h){if(h==null)return '—';if(h<1)return Math.max(1,Math.round(h*60))+' min';if(h<24)return Math.floor(h)+'h';const d=Math.floor(h/24);return d+(d===1?' día':' días');}
function renderClientes(){
 const el=$('viewClientes');
 if(!CLIENTES.length){el.innerHTML='<div class="loading">Cargando clientes… (se llena con la sincronización de GoHighLevel)</div>';return;}
 let base=CLIENTES.filter(c=>c.agente&&!excluido(c.agente));
 if(ROLE==='agente')base=base.filter(c=>sameAgent(c.agente,ME));
 base=base.map(c=>{
  const hLleg=hs(c.llegada_at),hReg=hs(c.registrado_at);
  let est,rank,horas;
  if(c.ftd_at){est='ftd';rank=3;horas=hLleg;}
  else if(c.registrado_at){est='reg';rank=(hReg>=20?0:hReg>=10?1:2);horas=hReg;}
  else{est='nada';rank=(hLleg>=20?0:hLleg>=10?1:2);horas=hLleg;}
  return {...c,est,rank,horas,hLleg};
 });
 let list=base.slice();
 if(CLI_FILTRO==='riesgo')list=list.filter(c=>c.est!=='ftd'&&c.horas>=4);
 else if(CLI_FILTRO==='nada')list=list.filter(c=>c.est==='nada');
 else if(CLI_FILTRO==='reg')list=list.filter(c=>c.est==='reg');
 else if(CLI_FILTRO==='ftd')list=list.filter(c=>c.est==='ftd');
 list.sort((a,b)=>a.rank-b.rank||(b.horas||0)-(a.horas||0));
 const nFtd=base.filter(c=>c.est==='ftd').length,nReg=base.filter(c=>c.est==='reg').length,
       nNada=base.filter(c=>c.est==='nada').length,nRiesgo=base.filter(c=>c.est!=='ftd'&&c.horas>=20).length;
 let kpis=`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-blue">${ICONS.tray}</div><div class="kpi-l">Clientes (3 días)</div></div><div class="kpi-n">${base.length}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-violet">${ICONS.check}</div><div class="kpi-l">Registrados sin FTD</div></div><div class="kpi-n" style="color:#c4b5fd">${nReg}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-green">${ICONS.coins}</div><div class="kpi-l">Con FTD</div></div><div class="kpi-n" style="color:#4ade80">${nFtd}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic">${ICONS.alert}</div><div class="kpi-l">Críticos (+20h)</div></div><div class="kpi-n" style="color:#f87171">${nRiesgo}</div></div>
  </div>`;
 const chip=(f,t)=>`<div class="chip ${CLI_FILTRO===f?'on':''}" onclick="cliFiltro('${f}')">${t}</div>`;
 let bar=`<div class="bar">${chip('todos','Todos ('+base.length+')')}${chip('riesgo','En riesgo (+4h)')}${chip('nada','Sin registro ('+nNada+')')}${chip('reg','Registrados ('+nReg+')')}${chip('ftd','Con FTD ('+nFtd+')')}</div>`;
 const badge=c=>{
  if(c.est==='ftd')return '<span class="pill" style="background:rgba(34,197,94,.13);color:#22c55e"><span class="dot" style="background:#22c55e"></span>FTD</span>';
  const crit=c.horas>=20,med=c.horas>=10,warn=c.horas>=4;
  const col=crit?['#ef4444','rgba(239,68,68,.13)']:med?['#f97316','rgba(249,115,22,.13)']:warn?['#eab308','rgba(234,179,8,.13)']:['#60a5fa','rgba(59,130,246,.13)'];
  const txt=c.est==='reg'?'Registrado · falta FTD':'Sin registro';
  return `<span class="pill" style="background:${col[1]};color:${col[0]}"><span class="dot" style="background:${col[0]}"></span>${txt}</span>`;
 };
 let body='';
 list.slice(0,300).forEach(c=>{
  const wa=(c.telefono||'').replace(/[^0-9]/g,'');
  const crit=c.est!=='ftd'&&c.horas>=20;
  const tel=c.telefono?(wa?`<a href="https://wa.me/${wa}" target="_blank" style="color:#22c55e;text-decoration:none">${esc(c.telefono)}</a>`:esc(c.telefono)):'<span class="z">—</span>';
  body+=`<tr class="${crit?'alert-row':''}">
   <td class="ag">${esc(c.nombre||'Sin nombre')}</td>
   <td data-label="Teléfono">${tel}</td>
   ${ROLE==='director'?`<td data-label="Agente" style="color:var(--ink2)">${esc(c.agente)}</td>`:''}
   <td data-label="Llegó hace" style="color:var(--ink2)">${hTxt(c.hLleg)}</td>
   <td data-label="Sin avanzar" style="color:${c.est==='ftd'?'#4ade80':(c.horas>=20?'#f87171':c.horas>=10?'#fb923c':'var(--ink2)')};font-weight:700">${c.est==='ftd'?'—':hTxt(c.horas)}</td>
   <td data-label="Estado" style="text-align:center">${badge(c)}</td></tr>`;
 });
 el.innerHTML=kpis+bar+`<div class="panel scroll"><table><thead><tr><th>Cliente</th><th>Teléfono</th>${ROLE==='director'?'<th>Agente</th>':''}<th>Llegó hace</th><th>Sin avanzar</th><th style="text-align:center">Estado</th></tr></thead><tbody>${body}</tbody></table></div>
   <div class="note"><b>Sin avanzar</b> = tiempo desde que llegó (si no tiene registro) o desde que se registró (si falta el FTD). Se envían avisos automáticos al agente a las <b>4h</b>, <b>10h</b> (segundo aviso) y <b>20h</b> (está a 4h de morir), tanto para leads sin registro como para registrados sin FTD. Muestra los leads de los últimos 3 días.</div>`;
}

/* auto-login */
if(ROLE&&ME){startApp();}
</script>
</body></html>
