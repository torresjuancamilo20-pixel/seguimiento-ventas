<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS · Reportes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
 --ink:#e6ecf5;--ink2:#aab6c8;--mut:#6b7688;--line:#1e2836;--line2:#171f2b;
 --paper:#080b12;--white:#0f1520;--card:#0f1520;
 --sig:#3b82f6;--sigd:#60a5fa;--sigbg:rgba(59,130,246,.12);
 --good:#22c55e;--goodbg:rgba(34,197,94,.11);--warn:#eab308;--warnbg:rgba(234,179,8,.11);
 --red:#ef4444;--redbg:rgba(239,68,68,.11);--gold:#f5c518;--goldbg:rgba(245,197,24,.10);
 --sh:0 1px 2px rgba(0,0,0,.4);--shl:0 8px 30px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;color-scheme:dark}
input,select{color:var(--ink)}
.hide{display:none!important}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(1000px 500px at 20% -10%,rgba(59,130,246,.09),transparent),var(--paper)}
.login-card{background:var(--white);border:1px solid var(--line);border-radius:18px;width:100%;max-width:410px;padding:32px 28px;box-shadow:var(--shl)}
.brand-badge{display:inline-flex;align-items:center;gap:9px;margin-bottom:16px}
.brand-badge .mk{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#1e293b,#334155);color:#e6ecf5;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px}
.brand-badge .tx{font-family:'Space Grotesk';font-weight:700;letter-spacing:.06em;font-size:13px}
.login-card h1{font-family:'Space Grotesk';font-weight:700;font-size:23px;margin:2px 0 4px}
.login-card p.sub{color:var(--mut);font-size:13px;margin-bottom:18px;line-height:1.5}
.roletabs{display:flex;gap:6px;margin-bottom:16px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:5px}
.roletab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-radius:8px}
.roletab.on{background:var(--white);color:var(--ink);box-shadow:var(--sh)}
label.fl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:700;display:block;margin:12px 0 7px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper);font-family:'Inter';font-size:15px}
.inp:focus{outline:none;border-color:var(--sig);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
.btn{width:100%;padding:13px;border:none;border-radius:11px;background:var(--sig);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px}
.btn:hover{background:#2f6fd6}.btn:disabled{opacity:.5}
.err{color:var(--red);font-size:12.5px;margin-top:10px;font-weight:600;min-height:16px}

/* SHELL */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#0a0e16;border-right:1px solid var(--line);color:#aab6c8;display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:14px}
.logo .mk{width:30px;height:30px;border-radius:9px;border:1.5px solid rgba(255,255,255,.18);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#e6ecf5}
.logo .tx{font-family:'Space Grotesk';font-weight:700;letter-spacing:.2em;font-size:12px;color:#e6ecf5}
nav{display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:#8592a6;cursor:pointer}
.nav-item .i{font-size:14px;width:18px;text-align:center;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.05);color:#dbe3ef}
.nav-item.active{background:rgba(59,130,246,.14);color:#dbe6fb;box-shadow:inset 0 0 0 1px rgba(59,130,246,.3)}
.side-foot{margin-top:auto;padding-top:16px}
.side-btn{width:100%;display:flex;align-items:center;gap:8px;justify-content:center;padding:10px;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(255,255,255,.04);color:#cbd5e1;font-size:12.5px;font-weight:600;cursor:pointer}
.side-btn:hover{background:rgba(255,255,255,.09);color:#fff}

.main{flex:1;min-width:0;padding:26px 30px 70px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sigd);font-weight:700}
h1.title{font-family:'Space Grotesk';font-weight:700;font-size:clamp(22px,3vw,30px);line-height:1.05;letter-spacing:-.02em;margin-top:6px}
.subtitle{color:var(--mut);font-size:13px;margin-top:6px}
.whoami{display:flex;align-items:center;gap:11px}
.whoami .av{width:38px;height:38px;border-radius:50%;background:var(--sig);color:#fff;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:13px}
.whoami .av.dir{background:#1e293b}
.whoami .nm{font-weight:700;font-size:14px}
.whoami .ro{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

/* KPIs */
.kpis{display:grid;gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--sh)}
.kpi-top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.kpi-ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:14px;flex-shrink:0}
.kpi-l{font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--mut);font-weight:700}
.kpi-n{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1}
.ic-blue{background:rgba(59,130,246,.15);color:#60a5fa}.ic-green{background:rgba(34,197,94,.15);color:#4ade80}
.ic-gold{background:rgba(245,197,24,.15);color:#f5c518}.ic-violet{background:rgba(167,139,250,.15);color:#c4b5fd}

/* toolbar */
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.chip{padding:9px 15px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:var(--white);color:var(--ink2)}
.chip.on{background:var(--sigbg);border-color:rgba(59,130,246,.4);color:var(--sigd)}
.bar input[type=date]{padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--white);font-family:'Inter';font-size:12.5px}
.bar .sp{flex:1}

/* tables */
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);overflow:hidden}
.section-t{font-family:'Space Grotesk';font-weight:600;font-size:16px;margin:2px 0 14px;display:flex;align-items:center;gap:9px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px}
thead th{background:#0b111b;text-align:right;padding:12px 13px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
thead th:nth-child(1),thead th:nth-child(2){text-align:left}
tbody td{padding:12px 13px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
.rk{text-align:center!important;color:var(--mut);font-weight:700;width:42px}
.ag{text-align:left!important;font-weight:600}
tr.top td{background:linear-gradient(90deg,rgba(245,197,24,.10),transparent)}
tr.top .ag{color:var(--gold)}
tr.me td{background:rgba(59,130,246,.08)}
tbody tr:hover td{background:rgba(255,255,255,.03)}
.g{color:var(--good);font-weight:800}.b{color:var(--sigd);font-weight:700}.money{color:var(--good);font-weight:800}
.z{color:#3a4658}
.conv{font-weight:800}
tfoot td{padding:13px;text-align:right;font-weight:800;border-top:2px solid var(--line);background:#0b111b}
tfoot td.lb{text-align:left;text-transform:uppercase;font-size:10px;letter-spacing:.05em;color:var(--gold)}
.barwrap{display:inline-block;width:70px;height:7px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;vertical-align:middle}
.barfill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:5px}
.scroll{overflow-x:auto}
.note{margin-top:14px;font-size:11.5px;color:var(--mut);line-height:1.6;border-left:3px solid var(--gold);padding:8px 13px;background:var(--goldbg);border-radius:8px}
.setup{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:26px;text-align:center;color:var(--mut);font-size:13.5px;line-height:1.7}
.setup h3{font-family:'Space Grotesk';color:var(--ink);margin-bottom:8px}
.setup code{background:#0b111b;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--sigd);font-size:12px}
.loading{text-align:center;padding:44px;color:var(--mut);font-size:13px}
.av-sm{width:30px;height:30px;border-radius:50%;display:inline-grid;place-items:center;color:#fff;font-size:11px;font-weight:700;font-family:'Space Grotesk';vertical-align:middle;margin-right:9px}

@media(max-width:900px){
 .app{flex-direction:column}
 .sidebar{width:100%;height:auto;position:static;flex-direction:row;align-items:center;padding:10px 12px;gap:12px}
 .logo{border:none;margin:0;padding:0}
 nav{flex:1;flex-direction:row;overflow-x:auto;gap:6px}
 .nav-item{white-space:nowrap}
 .side-foot{display:none}
 .main{padding:16px 14px 56px}
}
</style></head><body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
 <div class="login-card">
  <div class="brand-badge"><div class="mk">NX</div><div class="tx">NEXUS · REPORTES</div></div>
  <h1>Iniciar sesión</h1>

  <div class="roletabs">
   <div class="roletab on" data-role="agente" id="tabAgente">Soy agente</div>

  </div>

 </div>
</div>

<!-- APP -->
<div class="app hide" id="appScreen">
 <aside class="sidebar">
  <div class="logo"><div class="mk">NX</div><div class="tx">REPORTES</div></div>
  <nav id="nav">
   <div class="nav-item active" data-view="ventas"><span class="i">💰</span> Ventas</div>

 </aside>
 <main class="main">

    <div class="eyebrow" id="eyebrow">Panel</div>

    <div class="subtitle" id="viewSub"></div>
   </div>
   <div class="whoami">

    <div class="av" id="waAv">?</div>
   </div>
  </div>
  <div id="viewVentas"></div>
  <div id="viewFtds" class="hide"></div>
 </main>
</div>

<script>
const SUPABASE_URL="https://fhixjvxztmuifrioevze.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoaXhqdnh6dG11aWZyaW9ldnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NjgxNTUsImV4cCI6MjA5OTM0NDE1NX0.sTBxjWYr5m90-usvIJQyvTXon3TkD9Nk0V9z6IDQtmo";
const DIRECTOR_PASS="Director2026";
const HDRS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

// URL de tu Google Sheet de facturación publicado como CSV (Archivo > Compartir > Publicar en la web > CSV).
// Déjalo vacío para ver las instrucciones de conexión.
const VENTAS_CSV_URL="";

// Agentes/nombres a excluir de listados y rankings (no vendedores)
const EXCLUIR=['alejandro facundo','alejandro facundo junior','camilo torres','dannia cordoba','isabel ramirez','juan','juan camilo torres','juan carlos','valentina gutierrez','juan miguel pacheco'];
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim();}
function excluido(a){return EXCLUIR.includes(norm(a));}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let ROLE=localStorage.getItem('nexrep_role')||null;
let ME=localStorage.getItem('nexrep_me')||null;
let PAGE='ventas';
let AGENTES=[];      // {email,nombre}
let METRICAS=[];     // {fecha,agente,leads,registros,ftd}
let VENTAS=null;     // parsed sheet -> [{name, total, prods:{}}]
let FTD_PERIOD='mes';let FTD_FROM='',FTD_TO='';

const $=id=>document.getElementById(id);
const AVCOLORS=['#3b82f6','#8b5cf6','#ec4899','#f97316','#22c55e','#0891b2','#eab308','#6366f1','#14b8a6','#ef4444'];
function avColor(n){let s=0;for(const ch of (n||'?'))s+=ch.charCodeAt(0);return AVCOLORS[s%AVCOLORS.length];}
function initials(n){const p=(n||'?').trim().split(/\s+/);return (((p[0]||'?')[0]||'')+((p[1]||'')[0]||'')).toUpperCase()||'?';}
function avatar(n){return `<span class="av-sm" style="background:${avColor(n)}">${initials(n)}</span>`;}
function money(v){return v?('$'+Math.round(v).toLocaleString('en-US')):'—';}
function pct(f,l){return l>0?Math.round(f/l*100):0;}
function convColor(c){return c>=55?'#4ade80':(c>=40?'#facc15':(c>0?'#f87171':'#3a4658'));}

/* ---------- LOGIN ---------- */
document.querySelectorAll('.roletab').forEach(t=>t.onclick=()=>{
 document.querySelectorAll('.roletab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
 const r=t.dataset.role;$('agenteFields').classList.toggle('hide',r!=='agente');$('directorFields').classList.toggle('hide',r!=='director');$('loginErr').textContent='';
});
$('enterBtn').onclick=login;
$('agEmail').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
$('dirPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

async function login(){
 const role=document.querySelector('.roletab.on').dataset.role;
 $('loginErr').textContent='';
 if(role==='director'){
  if($('dirPass').value!==DIRECTOR_PASS){$('loginErr').textContent='Clave incorrecta.';return;}
  ROLE='director';ME='Director';
 }else{
  const email=($('agEmail').value||'').toLowerCase().trim();
  if(!email){$('loginErr').textContent='Escribe tu correo.';return;}
  $('enterBtn').disabled=true;$('enterBtn').textContent='Entrando…';
  await loadAgentes();
  const a=AGENTES.find(x=>x.email===email);
  $('enterBtn').disabled=false;$('enterBtn').textContent='Entrar';
  if(!a){$('loginErr').textContent='No encontramos ese correo. Usa el mismo de GoHighLevel.';return;}
  ROLE='agente';ME=a.nombre;
 }
 localStorage.setItem('nexrep_role',ROLE);localStorage.setItem('nexrep_me',ME);
 startApp();
}
$('logoutBtn').onclick=()=>{localStorage.removeItem('nexrep_role');localStorage.removeItem('nexrep_me');location.reload();};

/* ---------- DATA ---------- */
async function loadAgentes(){
 if(AGENTES.length)return;
 try{const r=await fetch(SUPABASE_URL+'/rest/v1/agentes?select=email,nombre',{headers:HDRS});AGENTES=await r.json();}catch(e){AGENTES=[];}
}
async function loadMetricas(){
 const r=await fetch(SUPABASE_URL+'/rest/v1/metricas_diarias?select=fecha,agente,leads,registros,ftd&order=fecha.desc',{headers:HDRS});
 METRICAS=await r.json();
}
function parseCSV(text){
 const rows=[];let i=0,f='',row=[],q=false;
 while(i<text.length){const c=text[i];
  if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
  else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c==='\r'){}else f+=c;}
  i++;}
 if(f.length||row.length){row.push(f);rows.push(row);}
 return rows;
}
async function loadVentas(){
 if(!VENTAS_CSV_URL){VENTAS='setup';return;}
 try{
  const r=await fetch(VENTAS_CSV_URL);const txt=await r.text();
  const rows=parseCSV(txt).filter(r=>r.some(c=>(c||'').trim()!==''));
  // localizar fila de encabezado: la que contiene "NOMBRE"
  let hi=rows.findIndex(r=>r.some(c=>norm(c)==='nombre'));
  if(hi<0)hi=0;
  const header=rows[hi].map(c=>(c||'').trim());
  const nameIdx=header.findIndex(c=>norm(c)==='nombre');
  const totIdx=header.findIndex(c=>norm(c).includes('total'));
  const prodIdx=[];header.forEach((c,idx)=>{if(idx!==nameIdx&&idx!==totIdx&&c&&idx>nameIdx)prodIdx.push(idx);});
  const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;};
  const out=[];
  for(let r=hi+1;r<rows.length;r++){
   const row=rows[r];const name=(row[nameIdx]||'').trim();
   if(!name||norm(name)==='total')continue;
   const prods={};let sum=0;
   prodIdx.forEach(idx=>{const v=num(row[idx]);if(v){prods[header[idx]]=(prods[header[idx]]||0)+v;sum+=v;}});
   const total=totIdx>=0?num(row[totIdx]):sum;
   out.push({name,total:total||sum,prods});
  }
  VENTAS=out;
 }catch(e){VENTAS='error';}
}

/* ---------- APP ---------- */
async function startApp(){
 $('loginScreen').classList.add('hide');$('appScreen').classList.remove('hide');
 $('waName').textContent=ME;$('waRole').textContent=ROLE==='director'?'Director':'Agente';
 $('waAv').textContent=initials(ME);$('waAv').classList.toggle('dir',ROLE==='director');
 document.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>showView(n.dataset.view));
 showView('ventas');
 renderVentas();renderFtds();
 await loadAgentes().catch(()=>{});
 await loadVentas().catch(()=>{VENTAS='error';});renderVentas();
 await loadMetricas().catch(()=>{METRICAS=[];});renderFtds();
}
function showView(v){
 PAGE=v;
 document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===v));
 $('viewVentas').classList.toggle('hide',v!=='ventas');
 $('viewFtds').classList.toggle('hide',v!=='ftds');
 $('eyebrow').textContent=v==='ventas'?'Facturación':'Conversión';
 $('viewTitle').textContent=v==='ventas'?'Reporte de ventas':"FTD's y registros";
 $('viewSub').textContent=v==='ventas'?'Facturación por agente y del equipo.':'Leads, registros, FTD y % de conversión.';
}

/* ---------- VENTAS ---------- */
function renderVentas(){
 const el=$('viewVentas');
 if(VENTAS==='setup'){el.innerHTML=`<div class="setup"><h3>Conecta tu hoja de cálculo 📄</h3>
   En Google Sheets abre <b>Archivo → Compartir → Publicar en la web</b>, elige la hoja de facturación y formato <code>CSV</code>.
   Copia el enlace y pásamelo; yo lo conecto y esta sección mostrará tu facturación en vivo.<br><br>
   La hoja debe tener una columna <code>NOMBRE</code>, las columnas de cada producto y una columna <code>TOTAL</code>.</div>`;return;}
 if(VENTAS==='error'){el.innerHTML=`<div class="setup"><h3>No pude leer la hoja ⚠️</h3>Revisa que el enlace esté <b>publicado como CSV</b> y sea público.</div>`;return;}
 if(!VENTAS||!VENTAS.length){el.innerHTML='<div class="loading">Cargando…</div>';return;}
 let list=VENTAS.filter(v=>!excluido(v.name));
 if(ROLE==='agente')list=list.filter(v=>norm(v.name)===norm(ME)||norm(ME).split(' ')[0]===norm(v.name).split(' ')[0]);
 list.sort((a,b)=>b.total-a.total);
 const gt=list.reduce((s,v)=>s+v.total,0);
 const top=list[0];
 // productos presentes
 const prodSet={};list.forEach(v=>Object.keys(v.prods).forEach(p=>prodSet[p]=(prodSet[p]||0)+v.prods[p]));
 const prods=Object.keys(prodSet).sort((a,b)=>prodSet[b]-prodSet[a]);
 const star=prods[0];
 let kpis=`<div class="kpis" style="grid-template-columns:repeat(3,1fr)">
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-gold">💵</div><div class="kpi-l">${ROLE==='agente'?'Tu facturación':'Total facturado'}</div></div><div class="kpi-n" style="color:#4ade80">${money(gt)}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-blue">🏆</div><div class="kpi-l">${ROLE==='agente'?'Ventas':'Top facturador'}</div></div><div class="kpi-n" style="font-size:19px">${ROLE==='agente'?list.length+' agente(s)':esc(top?top.name:'—')}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-violet">⭐</div><div class="kpi-l">Producto estrella</div></div><div class="kpi-n" style="font-size:19px">${star?esc(star):'—'}</div></div>
  </div>`;
 const maxT=list.length?list[0].total:1;
 let head=`<th>#</th><th>Agente</th>`+prods.map(p=>`<th>${esc(p)}</th>`).join('')+`<th>Total</th><th>%</th>`;
 let body='';
 list.forEach((v,i)=>{
  const cls=(i===0&&ROLE==='director'?'top':'')+(norm(v.name)===norm(ME)?' me':'');
  const tds=prods.map(p=>`<td class="${v.prods[p]?'':'z'}">${v.prods[p]?money(v.prods[p]):'—'}</td>`).join('');
  body+=`<tr class="${cls}"><td class="rk">${i+1}</td><td class="ag">${avatar(v.name)}${esc(v.name)}</td>${tds}<td class="money">${money(v.total)}</td>
   <td><span class="barwrap"><span class="barfill" style="width:${(v.total/maxT*100).toFixed(0)}%"></span></span></td></tr>`;
 });
 let foot=`<td></td><td class="lb">Total</td>`+prods.map(p=>`<td>${money(prodSet[p])}</td>`).join('')+`<td class="money">${money(gt)}</td><td></td>`;
 el.innerHTML=kpis+`<div class="panel scroll"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody>${ROLE==='director'?`<tfoot><tr>${foot}</tr></tfoot>`:''}</table></div>
   <div class="note"><b>En vivo desde tu Google Sheet.</b> Cada vez que registres una venta en la hoja, se refleja aquí al recargar.</div>`;
}

/* ---------- FTD'S ---------- */
function ftdSetPeriod(p){FTD_PERIOD=p;renderFtds();}
function inRange(f){
 const hoy=bogotaHoy();
 if(FTD_PERIOD==='hoy')return f===hoy;
 if(FTD_PERIOD==='7'){const d=new Date(hoy);d.setDate(d.getDate()-6);return f>=iso(d)&&f<=hoy;}
 if(FTD_PERIOD==='mes')return f.slice(0,7)===hoy.slice(0,7);
 if(FTD_PERIOD==='rango')return (!FTD_FROM||f>=FTD_FROM)&&(!FTD_TO||f<=FTD_TO);
 return true;
}
function bogotaHoy(){return new Date(Date.now()-5*3600*1000).toISOString().slice(0,10);}
function iso(d){return d.toISOString().slice(0,10);}
function renderFtds(){
 const el=$('viewFtds');
 if(!METRICAS.length){el.innerHTML='<div class="loading">Cargando métricas…</div>';return;}
 const hoy=bogotaHoy();
 // acumular por agente en el periodo seleccionado + hoy + mes
 const per={},today={},month={};
 const add=(o,a,r)=>{if(!o[a])o[a]={leads:0,registros:0,ftd:0};o[a].leads+=r.leads;o[a].registros+=r.registros;o[a].ftd+=r.ftd;};
 METRICAS.forEach(r=>{
  const a=r.agente;if(a==='sin asignar'||excluido(a))return;
  if(inRange(r.fecha))add(per,a,r);
  if(r.fecha===hoy)add(today,a,r);
  if(r.fecha.slice(0,7)===hoy.slice(0,7))add(month,a,r);
 });
 let names=Object.keys(per);
 if(ROLE==='agente')names=names.filter(a=>norm(a)===norm(ME)||norm(a).split(' ')[0]===norm(ME).split(' ')[0]);
 let list=names.map(a=>({a,...per[a],today:today[a]||{leads:0,ftd:0},month:month[a]||{leads:0,ftd:0}}));
 list.sort((x,y)=>y.ftd-x.ftd||y.registros-x.registros);
 const tot=list.reduce((s,x)=>({leads:s.leads+x.leads,registros:s.registros+x.registros,ftd:s.ftd+x.ftd}),{leads:0,registros:0,ftd:0});
 const perLbl=FTD_PERIOD==='hoy'?'hoy':FTD_PERIOD==='7'?'últimos 7 días':FTD_PERIOD==='mes'?'este mes':'rango';
 let kpis=`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-blue">📥</div><div class="kpi-l">Leads (${perLbl})</div></div><div class="kpi-n">${tot.leads}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-violet">✅</div><div class="kpi-l">Registros</div></div><div class="kpi-n">${tot.registros}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-green">💰</div><div class="kpi-l">FTD's</div></div><div class="kpi-n" style="color:#4ade80">${tot.ftd}</div></div>
   <div class="kpi"><div class="kpi-top"><div class="kpi-ic ic-gold">🎯</div><div class="kpi-l">Conversión</div></div><div class="kpi-n" style="color:#f5c518">${pct(tot.ftd,tot.leads)}%</div></div>
  </div>`;
 let bar=`<div class="bar">
   <div class="chip ${FTD_PERIOD==='hoy'?'on':''}" onclick="ftdSetPeriod('hoy')">Hoy</div>
   <div class="chip ${FTD_PERIOD==='7'?'on':''}" onclick="ftdSetPeriod('7')">7 días</div>
   <div class="chip ${FTD_PERIOD==='mes'?'on':''}" onclick="ftdSetPeriod('mes')">Este mes</div>
   <div class="chip ${FTD_PERIOD==='rango'?'on':''}" onclick="ftdSetPeriod('rango')">Rango</div>
   ${FTD_PERIOD==='rango'?`<input type="date" id="fFrom" value="${FTD_FROM}"><span style="color:var(--mut)">→</span><input type="date" id="fTo" value="${FTD_TO}">`:''}
  </div>`;
 let head=`<th>#</th><th>Agente</th><th>Leads</th><th>Registros</th><th>FTD</th><th>Conv. ${perLbl}</th><th>Conv. hoy</th><th>Conv. mes</th>`;
 let body='';
 list.forEach((x,i)=>{
  const c=pct(x.ftd,x.leads),ch=pct(x.today.ftd,x.today.leads),cm=pct(x.month.ftd,x.month.leads);
  const cls=(i===0&&ROLE==='director'?'top':'')+(norm(x.a)===norm(ME)?' me':'');
  body+=`<tr class="${cls}"><td class="rk">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</td>
   <td class="ag">${avatar(x.a)}${esc(x.a)}</td>
   <td class="b">${x.leads}</td><td>${x.registros}</td><td class="g">${x.ftd}</td>
   <td class="conv" style="color:${convColor(c)}">${c}%</td>
   <td class="conv" style="color:${convColor(ch)}">${x.today.leads?ch+'%':'<span class=z>—</span>'}</td>
   <td class="conv" style="color:${convColor(cm)}">${cm}%</td></tr>`;
 });
 let foot=`<td></td><td class="lb">Total</td><td class="b">${tot.leads}</td><td>${tot.registros}</td><td class="g">${tot.ftd}</td><td class="conv" style="color:${convColor(pct(tot.ftd,tot.leads))}">${pct(tot.ftd,tot.leads)}%</td><td></td><td></td>`;
 el.innerHTML=kpis+bar+`<div class="panel scroll"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody>${ROLE==='director'?`<tfoot><tr>${foot}</tr></tfoot>`:''}</table></div>
   <div class="note"><b>Conversión = FTD ÷ Leads.</b> "Conv. ${perLbl}" es del periodo elegido; también ves la de hoy y la del mes. Verde ≥55%, amarillo 40-54%, rojo &lt;40%. Los datos se actualizan con la sincronización de GoHighLevel (cada 15 min).</div>`;
 if(FTD_PERIOD==='rango'){
  $('fFrom').onchange=e=>{FTD_FROM=e.target.value;renderFtds();};
  $('fTo').onchange=e=>{FTD_TO=e.target.value;renderFtds();};
 }
}

/* auto-login */
if(ROLE&&ME){startApp();}
</script>
</body></html>
